<html>
<body>
<meta charset="utf-8">

<div style="color:red;font-size:50px;">
<script language="JavaScript">

var liczba_mki = parseFloat(prompt("Podaj liczbę:"));
if(liczba_mki%2==0)
{
  for(i=2; i<=13; i++)
  {
    document.write("majer" + "<br>");
  }
}
else
{
  for(i=1; i<=13; i++){
    document.write("nikodem" + "<br>");
  }
}
</script>
</div>

</body>
</html>
