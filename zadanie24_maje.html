<head>
<meta charset="utf-8">
</head>
<body>
<div style="color:pink;font-size:50px;">
<script language="JavaScript">
var x1_maje = parseFloat(prompt("x1=", ""));
var x2_maje = parseFloat(prompt("x2=", ""));

function y1_maje(x1) {
    return 3 * Math.pow(x1_maje, 6/8);
}

function x1_rad_maje(x1) {
    var st_maje = x1_maje;
    return (st_maje * Math.PI) / 180;
}

function y2_maje(x1){
    var st_maje = x1_maje;
    var rad_maje = (st_maje * Math.PI) / 180;
    return 2 * Math.cos(rad_maje) + 3 * Math.sin(rad_maje);
}

function y3_maje(x1, x2) {
    var x1_5 = Math.pow(x1_maje, 5);
    var x2_4 = Math.pow(x2_maje, 4);
    var x1_x2 = Math.abs(x1_maje - x2_maje);
    var pierwiastek = Math.cbrt(x1_5 + 2 * x2_4);
    return pierwiastek * x1_x2;
}

var y1_wynik = y1_maje(x1_maje);
var y2_wynik = y2_maje(x1_maje);
var y3_wynik = y3_maje(x1_maje, x2_maje);
var x1_radiany = x1_rad_maje(x1_maje);

document.write("x1 = " + x1_maje + "&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;");
document.write("x2 = " + x2_maje + "<br>");
document.write("x1(stopnie) = " + x1_maje + "&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;");
document.write("x1(radiany) = " + x1_radiany.toFixed(2) + "<br>");
document.write("y1 = " + y1_wynik.toFixed(2) + "<br>");
document.write("y2 = " + y2_wynik.toFixed(2) + "<br>");
document.write("y3 = " + y3_wynik.toFixed(2) + "<br>");

</script>
</div>
</body>
</html>
