<!DOCTYPE html>
<body>
<div style="color:green;font-size:50px;">
<script language="JavaScript">
    var m_majer = prompt("m=", "");
    var b_majer;
    var c_majer;
    var a_majer = parseFloat(m_majer);
    b_majer = a_majer + 1;
    c_majer = a_majer * (a_majer + 1);
    document.write("1/" + a_majer + " = 1/" + b_majer + " + 1/" + c_majer + "<br>");
</script>
</div>
</body>
</html>
