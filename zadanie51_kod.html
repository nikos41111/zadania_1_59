<div style="color:red;font-size:50px;">
<script>
silnia_koniec=parseFloat(prompt("z czego silnia",""));
if(silnia_koniec==0){silnia_m=1;}
else
{
  var silnia_m=1;
  for(i=1;i<=silnia_koniec;i++){
    silnia_m=silnia_m*i;
  }
}
document.write(silnia_koniec+"!="+silnia_m);
</script>
</div>
